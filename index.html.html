<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troubleshooting Guide — TBA22</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E8621A;
    --orange-light: #FFF0E8;
    --orange-mid: #F5A06A;
    --dark: #1A1612;
    --mid: #4A3F35;
    --muted: #9A8F84;
    --surface: #FDFAF7;
    --surface2: #F5EFE8;
    --border: rgba(74,63,53,0.15);
    --border2: rgba(74,63,53,0.25);
    --green: #2D7A45;
    --green-light: #EAF5EE;
    --red: #B33030;
    --red-light: #FDEAEA;
    --amber: #8A5A0A;
    --amber-light: #FEF5E0;
    --blue: #1A4F8A;
    --blue-light: #E8F0FB;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--surface);
    color: var(--dark);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--orange);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px 10px;
  }
  .header-icon {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  header h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  header p {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 1px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    overflow-x: auto;
    background: rgba(0,0,0,0.15);
    scrollbar-width: none;
    padding: 0 12px;
    gap: 4px;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .tab-btn.active {
    color: white;
    border-bottom-color: white;
  }
  .tab-btn:hover { color: white; }

  /* ── CONTROLS BAR ── */
  .controls {
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    background: white;
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    color: var(--dark);
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--orange); }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 16px; pointer-events: none;
  }
  .sort-wrap {
    display: flex; gap: 6px; align-items: center;
    font-size: 13px; color: var(--muted); flex-shrink: 0;
  }
  .sort-wrap select {
    padding: 8px 10px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    background: white;
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    color: var(--dark);
    cursor: pointer; outline: none;
  }
  .sort-wrap select:focus { border-color: var(--orange); }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex; gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .stat-chip strong { color: var(--dark); }

  /* ── MACHINE SECTION ── */
  .machine-section { margin: 12px 16px; }
  .machine-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--dark);
    color: white;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
  }
  .machine-header h2 { font-size: 14px; font-weight: 600; flex: 1; }
  .machine-header .count {
    background: var(--orange); color: white;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px;
  }
  .chevron { font-size: 16px; transition: transform 0.2s; }
  .machine-header.collapsed .chevron { transform: rotate(-90deg); }

  /* ── CARD ── */
  .alarm-card {
    background: white;
    border: 1px solid var(--border);
    border-top: none;
    overflow: hidden;
    transition: all 0.2s;
  }
  .alarm-card:last-child { border-radius: 0 0 10px 10px; }

  .alarm-header {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    border-left: 4px solid transparent;
    transition: background 0.15s;
  }
  .alarm-header:hover { background: var(--surface2); }
  .alarm-header.expanded { border-left-color: var(--orange); background: var(--orange-light); }

  .alarm-icon {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .alarm-icon.warning { background: var(--amber-light); color: var(--amber); }
  .alarm-icon.error   { background: var(--red-light); color: var(--red); }
  .alarm-icon.info    { background: var(--blue-light); color: var(--blue); }

  .alarm-meta { flex: 1; min-width: 0; }
  .alarm-name {
    font-size: 14px; font-weight: 600;
    color: var(--dark); line-height: 1.3;
    margin-bottom: 4px;
  }
  .alarm-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 11px; padding: 2px 8px;
    border-radius: 20px; font-weight: 500;
  }
  .tag-cause  { background: var(--amber-light); color: var(--amber); border: 1px solid #EAC870; }
  .tag-step   { background: var(--blue-light);  color: var(--blue);  border: 1px solid #A0C0EB; }
  .tag-fix    { background: var(--green-light);  color: var(--green); border: 1px solid #9ACFAA; }

  .expand-btn { color: var(--muted); font-size: 16px; flex-shrink: 0; padding-top: 4px; }

  /* ── DETAIL PANEL ── */
  .alarm-detail {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 0;
  }
  .alarm-detail.show { display: block; }

  .checklist-flow {
    padding: 14px 14px 16px;
    overflow-x: auto;
  }
  .checklist-flow h3 {
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  /* Steps timeline */
  .steps-timeline { display: flex; flex-direction: column; gap: 0; }
  .step-row { display: flex; gap: 10px; }
  .step-line-wrap {
    display: flex; flex-direction: column; align-items: center;
    width: 24px; flex-shrink: 0; padding-top: 4px;
  }
  .step-dot {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    flex-shrink: 0; color: white;
  }
  .step-dot.check1 { background: #E8621A; }
  .step-dot.check2 { background: #C44F12; }
  .step-dot.check3 { background: #A03C0A; }
  .step-dot.check4 { background: #7A2C06; }
  .step-dot.check5 { background: #541E04; }
 .step-dot.check6 { background: #3A1603; }
 .step-dot.check7 { background: #1F0C02; }

  .step-connector {
    flex: 1; width: 1.5px;
    background: var(--border2);
    min-height: 12px;
  }
  .step-body { flex: 1; padding-bottom: 14px; }
  .step-label {
    font-size: 11px; color: var(--muted); font-weight: 600;
    letter-spacing: 0.3px; margin-bottom: 3px;
  }
  .step-text { font-size: 13.5px; color: var(--dark); line-height: 1.5; }
 .cause-images {
   margin: 6px 0 8px;
 }
 .cause-images .image-grid {
   max-width: 760px;
 }

 .fix-line-highlight {
   display: inline-block;
   margin-top: 3px;
   padding: 2px 7px;
   border-radius: 6px;
   background: var(--green-light);
   color: var(--green);
   border: 1px solid #9ACFAA;
   font-weight: 700;
 }

  .step-row:last-child .step-connector { display: none; }

  /* Fix section */
  .fix-section {
    margin: 0 14px 14px;
    padding: 10px 12px;
    background: var(--green-light);
    border: 1px solid #9ACFAA;
    border-radius: 8px;
  }
  .fix-label {
    font-size: 11px; font-weight: 700; color: var(--green);
    letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .fix-item {
    font-size: 13px; color: #1A4A2A;
    padding: 3px 0;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .fix-num {
    font-weight: 700; font-family: 'IBM Plex Mono', monospace;
    color: var(--green); font-size: 12px; flex-shrink: 0; padding-top: 1px;
  }

 
 /* ── REFERENCE IMAGES ── */
 .reference-images {
   padding: 12px 14px 14px;
   background: white;
   border-left: 1px solid var(--border);
   border-right: 1px solid var(--border);
   border-bottom: 1px solid var(--border);
 }
 .reference-title {
   font-size: 12px;
   font-weight: 700;
   color: var(--muted);
   text-transform: uppercase;
   letter-spacing: 0.5px;
   margin-bottom: 10px;
   display: flex;
   align-items: center;
   gap: 6px;
 }
 .image-grid {
   display: grid;
   grid-template-columns: 1fr;
   gap: 12px;
   max-width: 760px;
 }
 .ref-figure {
   margin: 0;
   background: var(--surface);
   border: 1px solid var(--border);
   border-radius: 10px;
   overflow: hidden;
   max-width: 360px;
 }
 .image-button {
   display: block;
   width: 100%;
   padding: 0;
   border: 0;
   background: white;
   cursor: zoom-in;
   touch-action: manipulation;
   position: relative;
 }
 .image-button::after {
   content: "คลิกเพื่อขยาย";
   position: absolute;
   right: 8px;
   bottom: 8px;
   padding: 4px 8px;
   border-radius: 999px;
   background: rgba(26, 22, 18, 0.78);
   color: white;
   font-family: 'Sarabun', sans-serif;
   font-size: 11px;
   line-height: 1;
   opacity: 0;
   transform: translateY(4px);
   transition: all 0.15s ease;
 }
 .image-button:hover::after,
 .image-button:focus-visible::after {
   opacity: 1;
   transform: translateY(0);
 }
 .ref-figure img {
   display: block;
   width: 100%;
   max-height: 220px;
   height: auto;
   object-fit: contain;
   background: white;
 }
 .ref-figure figcaption {
   padding: 8px 10px;
   font-size: 12px;
   color: var(--mid);
   border-top: 1px solid var(--border);
   background: var(--surface2);
 }
 .image-hint {
   margin-top: 8px;
   font-size: 12px;
   color: var(--muted);
 }
 .image-modal {
   display: none;
   position: fixed;
   inset: 0;
   z-index: 9999;
   background: rgba(0, 0, 0, 0.82);
   padding: 18px;
   align-items: center;
   justify-content: center;
 }
 .image-modal.show { display: flex; }
 .image-modal-content {
   width: min(96vw, 1180px);
   max-height: 92vh;
   display: flex;
   flex-direction: column;
   gap: 10px;
 }
 .image-modal img {
   width: 100%;
   max-height: 82vh;
   object-fit: contain;
   background: white;
   border-radius: 10px;
 }
 .image-modal-caption {
   color: white;
   font-size: 13px;
   text-align: center;
 }
 .image-modal-close {
   position: fixed;
   top: 12px;
   right: 14px;
   width: 38px;
   height: 38px;
   border: 0;
   border-radius: 999px;
   background: rgba(255,255,255,0.92);
   color: var(--dark);
   font-size: 24px;
   line-height: 38px;
   cursor: pointer;
   box-shadow: 0 2px 12px rgba(0,0,0,0.24);
 }
 @media (min-width: 640px) {
   .image-grid {
     grid-template-columns: repeat(2, minmax(220px, 360px));
     align-items: start;
   }
 }

 /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--muted);
    font-size: 14px;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 24px 20px;
    font-size: 12px; color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 16px;
  }

  @media (min-width: 640px) {
    .machine-section { margin: 16px 24px; }
    .controls { padding: 14px 24px; }
    .stats-bar { padding: 10px 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-icon">🔧</div>
    <div>
      <h1>Troubleshooting Guide</h1>
      <p>คู่มือแก้ปัญหาสำหรับช่าง — สแกน QR เพื่ออ่าน</p>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('tba22', this)">Alarm Slow Filling</button>
    <button class="tab-btn" onclick="switchTab('tba22empty', this)">Alarm Slow Empty</button>
    <button class="tab-btn" onclick="switchTab('all', this)">ทั้งหมด</button>
    <!-- เพิ่ม Tab ใหม่ได้ที่นี่ -->
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="ค้นหา alarm, อาการ, หรือวิธีแก้..." oninput="render()">
  </div>
  <div class="sort-wrap">
    <label for="sortBy">เรียงโดย</label>
    <select id="sortBy" onchange="render()">
      <option value="default">ค่าเริ่มต้น</option>
      <option value="alpha">A→Z ชื่ออาการ</option>
      <option value="causes">จำนวนสาเหตุ ↓</option>
      <option value="fixes">จำนวนวิธีแก้ ↓</option>
    </select>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div id="content"></div>

<footer>อัปเดตล่าสุด: พ.ค. 2569 · สอบถามหัวหน้าทีมก่อนทำการแก้ไขใดๆ</footer>


<div class="image-modal" id="imageModal" onclick="closeImageModal(event)">
  <button class="image-modal-close" type="button" onclick="closeImageModal()" aria-label="ปิดภาพขยาย">×</button>
  <div class="image-modal-content" onclick="event.stopPropagation()">
    <img id="imageModalImg" src="" alt="">
    <div class="image-modal-caption" id="imageModalCaption"></div>
  </div>
</div>

let activeTab = 'tba22';
let openCards = new Set();

function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  openCards.clear();
  
function openImageModalFromButton(button) {
  const image = button.querySelector('img');
  const figure = button.closest('.ref-figure');
  const captionEl = figure ? figure.querySelector('figcaption') : null;
  const src = image ? image.getAttribute('src') : '';
  const alt = image ? image.getAttribute('alt') : '';
  const caption = captionEl ? captionEl.textContent : '';
  openImageModal(src, alt, caption);
}
function openImageModal(src, alt, caption) {
  const modal = document.getElementById('imageModal');
  const img = document.getElementById('imageModalImg');
  const cap = document.getElementById('imageModalCaption');
  img.src = src;
  img.alt = alt || caption || 'ภาพประกอบ';
  cap.textContent = caption || '';
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeImageModal(event) {
  if (event && event.target && event.target.id !== 'imageModal') return;
  const modal = document.getElementById('imageModal');
  const img = document.getElementById('imageModalImg');
  modal.classList.remove('show');
  img.src = '';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(event) {
  if (event.key === 'Escape') closeImageModal();
});

render();
}

function getAlarms() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sortBy').value;
  let sources = activeTab === 'all'
    ? Object.values(DATA)
    : [DATA[activeTab]].filter(Boolean);

  let results = [];
  for (const src of sources) {
    for (const alarm of src.alarms) {
      if (!q ||
          alarm.name.toLowerCase().includes(q) ||
          alarm.causes.some(c => c.text.toLowerCase().includes(q)) ||
          alarm.fixes.some(f => f.toLowerCase().includes(q))) {
        results.push({ ...alarm, _machine: src.machine, _images: src.images || [] });
      }
    }
  }

  if (sort === 'alpha')  results.sort((a,b) => a.name.localeCompare(b.name, 'th'));
  if (sort === 'causes') results.sort((a,b) => b.causes.length - a.causes.length);
  if (sort === 'fixes')  results.sort((a,b) => b.fixes.length - a.fixes.length);

  return results;
}


function formatTroubleshootingLine(line) {
  const escaped = line
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
  return escaped.startsWith('สาเหตุ/การแก้ไข:')
    ? `<span class="fix-line-highlight">${escaped}</span>`
    : escaped;
}

function toggleCard(id) {
  if (openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  render();
}

function render() {
  const alarms = getAlarms();
  const content = document.getElementById('content');
  const stats = document.getElementById('statsBar');

  stats.innerHTML = `
    <span class="stat-chip"><strong>${alarms.length}</strong> รายการ</span>
    <span class="stat-chip"><strong>${alarms.reduce((s,a) => s + a.causes.length, 0)}</strong> สาเหตุทั้งหมด</span>
    <span class="stat-chip"><strong>${alarms.reduce((s,a) => s + a.fixes.length, 0)}</strong> วิธีแก้ทั้งหมด</span>
  `;

  if (alarms.length === 0) {
    content.innerHTML = `<div class="empty-state">🔍 ไม่พบรายการที่ตรงกับ "${document.getElementById('search').value}"</div>`;
    return;
  }

  // Group by machine
  const groups = {};
  for (const a of alarms) {
    if (!groups[a._machine]) groups[a._machine] = [];
    groups[a._machine].push(a);
  }

  let html = '';
  for (const [machine, list] of Object.entries(groups)) {
    html += `<div class="machine-section">
      <div class="machine-header" onclick="toggleMachine(this)">
        <span>⚙️</span>
        <h2>${machine}</h2>
        <span class="count">${list.length}</span>
        <span class="chevron">▾</span>
      </div>`;

    const machineImages = (list[0] && list[0]._images) ? list[0]._images : [];
    if (machineImages.length) {
      const imagesHtml = machineImages.map(img => `
        <figure class="ref-figure">
          <button class="image-button" type="button" onclick="openImageModalFromButton(this)" aria-label="ขยายภาพ: ${img.caption}">
            <img src="${img.src}" alt="${img.alt}" loading="lazy">
          </button>
          <figcaption>${img.caption}</figcaption>
        </figure>
      `).join('');
      html += `<div class="reference-images">
        <div class="reference-title">🖼️ ภาพประกอบสำหรับหัวข้อนี้</div>
        <div class="image-grid">${imagesHtml}</div>
        <div class="image-hint">แตะ/คลิกที่รูปเพื่อขยายภาพเต็มหน้าจอ</div>
      </div>`;
    }

    for (const alarm of list) {
      const isOpen = openCards.has(alarm.id);
      const iconMap = { warning: '⚠️', error: '🔴', info: 'ℹ️' };

      // Build steps
      const stepDots = ['check1','check2','check3','check4','check5','check6','check7'];
      let stepsHtml = alarm.causes.map((c, i) => {
        const lines = c.text.split('\n').map(l => `<div>${formatTroubleshootingLine(l)}</div>`).join('');
        const causeImagesHtml = (c.images || []).map(img => `
          <figure class="ref-figure">
            <button class="image-button" type="button" onclick="openImageModalFromButton(this)" aria-label="ขยายภาพ: ${img.caption}">
              <img src="${img.src}" alt="${img.alt}" loading="lazy">
            </button>
            <figcaption>${img.caption}</figcaption>
          </figure>
        `).join('');
        return `<div class="step-row">
          <div class="step-line-wrap">
            <div class="step-dot ${stepDots[i]}">${i+1}</div>
            <div class="step-connector"></div>
          </div>
          <div class="step-body">
            <div class="step-label">${c.label}</div>
            ${causeImagesHtml ? `<div class="cause-images"><div class="image-grid">${causeImagesHtml}</div></div>` : ''}
            <div class="step-text">${lines}</div>
          </div>
        </div>`;
      }).join('');

      let fixesHtml = alarm.fixes.map((f, i) =>
        `<div class="fix-item"><span class="fix-num">${i+1}.</span><span>${f}</span></div>`
      ).join('');

      html += `<div class="alarm-card">
        <div class="alarm-header ${isOpen ? 'expanded' : ''}" onclick="toggleCard(${alarm.id})">
          <div class="alarm-icon ${alarm.icon}">${iconMap[alarm.icon]}</div>
          <div class="alarm-meta">
            <div class="alarm-name">${alarm.name}</div>
            <div class="alarm-tags">
              <span class="tag tag-cause">${alarm.causes.length} สาเหตุ</span>
              <span class="tag tag-fix">${alarm.fixes.length} วิธีแก้</span>
            </div>
          </div>
          <span class="expand-btn">${isOpen ? '▲' : '▼'}</span>
        </div>
        <div class="alarm-detail ${isOpen ? 'show' : ''}">
          <div class="checklist-flow">
            <h3>ขั้นตอนการตรวจสอบ</h3>
            <div class="steps-timeline">${stepsHtml}</div>
          </div>
          <div class="fix-section">
            <div class="fix-label">✅ สาเหตุ / การแก้ไข</div>
            ${fixesHtml}
          </div>
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  content.innerHTML = html;
}

function toggleMachine(header) {
  header.classList.toggle('collapsed');
  const section = header.parentElement;
  const cards = section.querySelectorAll('.alarm-card');
  const isCollapsed = header.classList.contains('collapsed');
  cards.forEach(c => c.style.display = isCollapsed ? 'none' : '');
}

render();
</script>
</body>
</html>
